<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>
    <style>
        body { font-family: Arial, sans-serif; }
        .todo { border: 1px solid #ccc; padding: 10px; margin: 5px; display: flex; justify-content: space-between; }
        .btn { cursor: pointer; margin-left: 5px; padding: 5px; border: none; }
        .edit { background-color: yellow; }
        .delete { background-color: red; color: white; }
    </style>
</head>
<body>

    <h1>Todo App</h1>
    <input type="text" id="title" placeholder="Title">
    <input type="text" id="description" placeholder="Description">
    <button onclick="addTodo()">Add Todo</button>

    <div id="todos"></div>

    <script>
        const API_URL = "http://localhost:3000";

        // ✅ Fetch Todos
        async function fetchTodos() {
            const res = await fetch(`${API_URL}/todos`);
            const todos = await res.json();
            document.getElementById("todos").innerHTML = todos.map(todo => `
                <div class="todo">
                    <span>${todo.title} - ${todo.description} (${todo.completed ? "✅" : "❌"})</span>
                    <button class="btn edit" onclick="editTodo('${todo.id}', '${todo.title}', '${todo.description}', ${todo.completed})">Edit</button>
                    <button class="btn delete" onclick="deleteTodo('${todo.id}')">Delete</button>
                </div>
            `).join("");
        }

        // ✅ Add Todo
        async function addTodo() {
            const title = document.getElementById("title").value;
            const description = document.getElementById("description").value;
            await fetch(`${API_URL}/todo`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ title, description })
            });
            fetchTodos();
        }

        // ✅ Edit Todo
        async function editTodo(id, oldTitle, oldDesc, completed) {
            const newTitle = prompt("Update Title:", oldTitle);
            const newDesc = prompt("Update Description:", oldDesc);
            if (!newTitle || !newDesc) return;

            await fetch(`${API_URL}/todo/${id}`, {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ title: newTitle, description: newDesc, completed })
            });
            fetchTodos();
        }

        // ✅ Delete Todo
        async function deleteTodo(id) {
            if (!confirm("Are you sure you want to delete this todo?")) return;

            await fetch(`${API_URL}/todo/${id}`, {
                method: "DELETE"
            });
            fetchTodos();
        }

        fetchTodos();
    </script>
</body>
</html>
